<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>代號-亞當 (PROJECT ADAM) - 生存終端</title>
    <style>
        :root { --main: #00ff41; --bg: #050505; --danger: #ff4444; --warn: #ffbb00; }
        body { background: var(--bg); color: var(--main); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; }
        
        /* 終端機濾鏡 */
        body::after { content: " "; position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.2) 50%); background-size: 100% 4px; pointer-events: none; opacity: 0.15; }

        #home-screen, #game-ui { position: fixed; width: 100%; height: 100%; top:0; left:0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #game-ui { display: none; padding: 20px; box-sizing: border-box; grid-template-columns: 280px 1fr 280px; grid-template-rows: 60px 1fr 120px; gap: 15px; }
        
        .panel { border: 1px solid var(--main); padding: 15px; background: rgba(0,0,0,0.9); }
        button { background: transparent; color: var(--main); border: 1px solid var(--main); padding: 10px; margin: 5px; cursor: pointer; text-transform: uppercase; width: 100%; }
        button:hover { background: var(--main); color: var(--bg); }
        
        .status-bar { height: 10px; background: #222; margin: 5px 0 10px 0; border: 1px solid #333; }
        .fill { height: 100%; background: var(--main); transition: 0.5s; }
        #log { height: 350px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin: 10px 0; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 style="text-shadow: 0 0 10px var(--main);">> [ 代號-亞當 : 啟動 ]</h1>
        <button style="width:300px;" onclick="newGame()">新遊戲 (NEW MISSION)</button>
        <button style="width:300px;" onclick="showLoadMenu()">讀取存檔 (LOAD DATA)</button>
        <div id="load-menu" style="display:none; margin-top:20px;">
            <h3>選擇存檔位：</h3>
            <div id="save-list"></div>
        </div>
    </div>

    <div id="game-ui">
        <div class="panel" style="grid-column: 1/4; display:flex; justify-content:space-between; align-items:center;">
            <div>> 系統: 代號-亞當 | <span id="weather-display">天氣: 晴天</span></div>
            <div>STATUS: ONLINE</div>
        </div>
        <div class="panel">
            <h3>[ 生理體徵 ]</h3>
            HP: <div class="status-bar"><div id="hp-bar" class="fill" style="width:100%"></div></div>
            飢餓: <div class="status-bar"><div id="hng-bar" class="fill" style="width:100%"></div></div>
            乾渴: <div class="status-bar"><div id="thr-bar" class="fill" style="width:100%"></div></div>
            <button onclick="showBackpack()">[ 打開背包 ]</button>
        </div>
        <div class="panel">
            <h3>[ 環境行動 ]</h3>
            <div id="log"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button onclick="scavenge('醫院')">醫院</button><button onclick="scavenge('森林')">森林</button>
                <button onclick="scavenge('超市')">超市</button><button onclick="scavenge('停車場')">停車場</button>
            </div>
        </div>
        <div class="panel">
            <h3>[ 營地管理 ]</h3>
            <p id="comp-info">無同伴</p>
            <button onclick="rest()">休息</button>
            <button onclick="location.reload()">退出系統</button>
        </div>
    </div>

    <div id="backpack-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center;">
        <div class="panel" style="width:300px;"><h3>[ 背包物品 ]</h3><div id="inventory-list"></div><button onclick="closeModal()">關閉</button></div>
    </div>

    <script>
        // 你的 GAS 網址已完成設定
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzhBvrnLbp-LoaWZIoE3PYij_aoj1s34xPrUkUj8GRdRs_B_afmftS1XrZx0LrzbgoN/exec"; 
        
        let state = {}, currentSaveSlot = null;

        function newGame() {
            let saves = JSON.parse(localStorage.getItem('adam_saves') || '[]');
            currentSaveSlot = saves.length;
            state = { hp: 100, hng: 100, thr: 100, backpack: [], days: 0, weather: '晴天' };
            startGame();
        }

        function showLoadMenu() {
            document.getElementById('load-menu').style.display = 'block';
            let saves = JSON.parse(localStorage.getItem('adam_saves') || '[]');
            let list = document.getElementById('save-list'); list.innerHTML = '';
            saves.forEach((data, i) => {
                let btn = document.createElement('button'); btn.innerText = `存檔 #${i+1}`;
                btn.onclick = () => { currentSaveSlot = i; state = data; startGame(); };
                list.appendChild(btn);
            });
        }

        function startGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'grid';
            updateUI();
        }

        function saveGame() {
            let saves = JSON.parse(localStorage.getItem('adam_saves') || '[]');
            saves[currentSaveSlot] = state;
            localStorage.setItem('adam_saves', JSON.stringify(saves));
        }

        function updateUI() {
            document.getElementById('hp-bar').style.width = Math.min(100, state.hp) + '%';
            document.getElementById('hng-bar').style.width = Math.min(100, state.hng) + '%';
            document.getElementById('thr-bar').style.width = Math.min(100, state.thr) + '%';
            document.getElementById('weather-display').innerText = `天氣: ${state.weather}`;
            saveGame();
        }

        function addLog(msg) {
            let log = document.getElementById('log');
            log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
        }

        function scavenge(area) {
            addLog(`探索 ${area}...`);
            if(state.weather === '沙塵暴') state.hp -= 5;
            updateUI();
        }

        function showBackpack() {
            document.getElementById('backpack-modal').style.display = 'flex';
            let list = document.getElementById('inventory-list'); list.innerHTML = '';
            state.backpack.forEach((item, i) => {
                let btn = document.createElement('button'); btn.innerText = item;
                btn.onclick = () => {
                    if(item === '生肉') state.backpack[i] = '熟肉';
                    else state.backpack.splice(i, 1);
                    updateUI(); closeModal();
                };
                list.appendChild(btn);
            });
        }

        function closeModal() { document.getElementById('backpack-modal').style.display = 'none'; }
        function rest() { state.hp += 10; updateUI(); addLog("恢復了部分體力。"); }
        
        setInterval(() => {
            const w = ['晴天', '大雨', '沙塵暴'];
            state.weather = w[Math.floor(Math.random()*3)];
            updateUI();
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廢土生存 2026 - Wasteland Survival</title>
    <style>
        :root { --main-color: #00ff41; --bg-color: #0a0a0a; --border-color: #444; --danger-color: #ff4444; --warn-color: #ffbb00; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-shadow: 0 0 5px var(--main-color); }
        .cr { text-transform: uppercase; }
        .game-container { border: 2px solid var(--border-color); width: 1000px; height: 600px; display: grid; grid-template-columns: 250px 1fr; grid-template-rows: 60px 1fr 100px; gap: 10px; padding: 10px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .box { border: 1px solid var(--border-color); padding: 10px; overflow: hidden; }
        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-color); }
        .sidebar { grid-row: 2 / -1; display: flex; flex-direction: column; gap: 15px; }
        .bar-bg { background: #222; height: 10px; border: 1px solid #555; width: 100%; margin-bottom: 10px; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        #hp-bar { background-color: var(--danger-color); }
        #hunger-bar { background-color: var(--warn-color); }
        #thirst-bar { background-color: #4444ff; }
        .main-content { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; background: rgba(0,0,0,0.5); }
        #event-log { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.95em; line-height: 1.6; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 8px; padding-left: 10px; border-left: 2px solid transparent; }
        .log-entry.system { border-left-color: var(--main-color); color: #aaa; }
        .log-entry.reward { border-left-color: #00ff00; color: #fff; background: rgba(0,255,0,0.1); }
        .log-entry.penalty { border-left-color: var(--danger-color); color: var(--danger-color); background: rgba(255,0,0,0.1); }
        .control-panel { grid-column: 2; grid-row: 3; display: flex; justify-content: center; align-items: center; gap: 20px; }
        button { background: transparent; color: var(--main-color); border: 2px solid var(--main-color); padding: 10px 30px; font-family: inherit; font-size: 1.1em; cursor: pointer; }
        button:hover { background: var(--main-color); color: var(--bg-color); }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>[ 系統存取驗證 ]</h2>
            <input type="text" id="user" placeholder="使用者代碼" value="player1"><br>
            <input type="password" id="pass" placeholder="安全密碼" value="12345"><br>
            <button onclick="login()">初始化連結</button>
        </div>
    </div>

    <div class="game-container">
        <div class="header">
            <div>WASTELAND SURVIVAL</div>
            <div>[ 天數: <span id="days">0</span> ]</div>
        </div>

        <div class="box sidebar">
            <h3>生命體徵</h3>
            <div>HP: <span id="hp-text">100/100</span><div class="bar-bg"><div class="bar-fill" id="hp-bar" style="width: 100%"></div></div></div>
            <div>飢餓: <span id="hunger-text">100/100</span><div class="bar-bg"><div class="bar-fill" id="hunger-bar" style="width: 100%"></div></div></div>
            <div>乾渴: <span id="thirst-text">100/100</span><div class="bar-bg"><div class="bar-fill" id="thirst-bar" style="width: 100%"></div></div></div>
            <div id="companion-status" style="color:var(--warn-color);"></div>
        </div>

        <div class="box main-content">
            <div id="event-log"><div class="log-entry system">系統就緒。</div></div>
        </div>

        <div class="box control-panel">
            <button onclick="action('scavenge')">野外搜刮</button>
            <button onclick="action('rest')">營地休息</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzhBvrnLbp-LoaWZIoE3PYij_aoj1s34xPrUkUj8GRdRs_B_afmftS1XrZx0LrzbgoN/exec"; 
        let days = 0, hp = 100, hunger = 100, thirst = 100, hasCompanion = false, userName = "";

        function addLog(text, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[第 ${days} 天] ${text}`;
            document.getElementById('event-log').appendChild(entry);
        }

        function updateUI() {
            document.getElementById('days').innerText = days;
            document.getElementById('hp-text').innerText = `${hp}/100`;
            document.getElementById('hunger-text').innerText = `${hunger}/100`;
            document.getElementById('thirst-text').innerText = `${thirst}/100`;
            document.getElementById('hp-bar').style.width = `${hp}%`;
            document.getElementById('hunger-bar').style.width = `${hunger}%`;
            document.getElementById('thirst-bar').style.width = `${thirst}%`;
            document.getElementById('companion-status').innerText = hasCompanion ? "[同伴已加入]" : "";
        }

        async function login() {
            userName = document.getElementById('user').value;
            document.getElementById('login-overlay').style.display = 'none';
            updateUI();
        }

        async function action(type) {
            days++;
            if (type === 'scavenge') {
                if (Math.random() < 0.3) {
                    handleSurvivorEncounter();
                } else if (Math.random() < 0.6) {
                    hunger += 30; thirst += 30;
                    addLog("你搜刮到了物資！(HNG/THR +30)", 'reward');
                } else {
                    addLog("這次搜刮一無所獲。");
                }
            } else {
                hp += 15;
                if(hasCompanion) hunger += 10;
                addLog("休息恢復了生命。");
            }
            hunger -= 15; thirst -= 15;
            updateUI();
        }

        function handleSurvivorEncounter() {
            let choice = confirm("遇到倖存者！[確定]邀請 [取消]攻擊");
            if (choice) {
                if (Math.random() < 0.7) { hasCompanion = true; addLog("他加入了你！", 'reward'); }
                else addLog("他拒絕了你。");
            } else {
                if (Math.random() < 0.5) { hunger += 30; addLog("掠奪成功！", 'reward'); }
                else { hp -= 30; addLog("反擊受傷！", 'penalty'); }
            }
        }
    </script>
</body>
</html>

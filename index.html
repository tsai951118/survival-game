<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廢土生存 2026 - Wasteland Survival</title>
    <style>
        :root { --main-color: #00ff41; --bg-color: #0a0a0a; --border-color: #444; --danger-color: #ff4444; --warn-color: #ffbb00; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-shadow: 0 0 5px var(--main-color); }
        .cr { text-transform: uppercase; }
        
        /* 遊戲主容器 */
        .game-container { border: 2px solid var(--border-color); width: 1000px; height: 600px; display: grid; grid-template-columns: 250px 1fr; grid-template-rows: 60px 1fr 100px; gap: 10px; padding: 10px; box-sizing: border-color; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .box { border: 1px solid var(--border-color); padding: 10px; overflow: hidden; }

        /* 標題區 */
        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border: none; border-bottom: 2px solid var(--main-color); }
        .title { font-size: 1.5em; font-weight: bold; }

        /* 左側狀態欄 */
        .sidebar { grid-row: 2 / -1; display: flex; flex-direction: column; gap: 15px; }
        .status-item { margin-bottom: 10px; }
        .status-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9em; }
        .bar-bg { background: #222; height: 10px; border: 1px solid #555; width: 100%; }
        .bar-fill { height: 100%; transition: width 0.3s ease, background-color 0.3s ease; }
        #hp-bar { background-color: var(--danger-color); }
        #hunger-bar { background-color: var(--warn-color); }
        #thirst-bar { background-color: #4444ff; }

        /* 中央日誌區 */
        .main-content { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; background: rgba(0,0,0,0.5); }
        #event-log { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.95em; line-height: 1.6; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 8px; padding-left: 10px; border-left: 2px solid transparent; }
        .log-entry.system { border-left-color: var(--main-color); color: #aaa; }
        .log-entry.reward { border-left-color: #00ff00; color: #fff; background: rgba(0,255,0,0.1); }
        .log-entry.penalty { border-left-color: var(--danger-color); color: var(--danger-color); background: rgba(255,0,0,0.1); }
        .log-entry.death { color: #fff; background: var(--danger-color); font-weight: bold; text-align: center; border: none; }

        /* 下方控制區 */
        .control-panel { grid-column: 2; grid-row: 3; display: flex; justify-content: center; align-items: center; gap: 20px; }
        button { background: transparent; color: var(--main-color); border: 2px solid var(--main-color); padding: 10px 30px; font-family: inherit; font-size: 1.1em; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        button:hover { background: var(--main-color); color: var(--bg-color); box-shadow: 0 0 10px var(--main-color); }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; text-shadow: none; }

        /* 登入區 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; gap: 15px; }
        .login-box { border: 2px solid var(--main-color); padding: 30px; text-align: center; box-shadow: 0 0 20px var(--main-color); }
        input { background: #000; border: 1px solid var(--main-color); color: var(--main-color); padding: 10px; font-family: inherit; font-size: 1.1em; margin-bottom: 15px; width: 200px; text-align: center; }
        input:focus { outline: none; box-shadow: 0 0 5px var(--main-color); }

        /* 滾動條樣式 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }
        ::-webkit-scrollbar-thumb:hover { background: var(--main-color); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box CR">
            <h2>[ 系統存取驗證 ]</h2>
            <input type="text" id="user" placeholder="使用者代碼" value="player1"><br>
            <input type="password" id="pass" placeholder="安全密碼" value="12345"><br>
            <button onclick="login()">初始化連結</button>
            <p id="login-msg" style="font-size:0.8em; color:var(--danger-color);"></p>
        </div>
    </div>

    <div class="game-container CR">
        <div class="header">
            <div class="title">WASTELAND SURVIVAL v0.2</div>
            <div>[ 存活天數: <span id="days">0</span> ]</div>
            <div>[ 玩家: <span id="player-name">---</span> ]</div>
        </div>

        <div class="box sidebar">
            <h3>核心生命體徵</h3>
            
            <div class="status-item">
                <div class="status-label"><span>生命值 (HP)</span><span id="hp-text">100/100</span></div>
                <div class="bar-bg"><div class="bar-fill" id="hp-bar" style="width: 100%"></div></div>
            </div>

            <div class="status-item">
                <div class="status-label"><span>飢餓度 (HNG)</span><span id="hunger-text">100/100</span></div>
                <div class="bar-bg"><div class="bar-fill" id="hunger-bar" style="width: 100%"></div></div>
            </div>

            <div class="status-item">
                <div class="status-label"><span>乾渴值 (THR)</span><span id="thirst-text">100/100</span></div>
                <div class="bar-bg"><div class="bar-fill" id="thirst-bar" style="width: 100%"></div></div>
            </div>
            
            <div style="margin-top:auto; font-size:0.8em; color:#666;">
                提示: 搜刮會消耗資源，休息會緩慢恢復生命。每日消耗10點飢餓與乾渴。
            </div>
        </div>

        <div class="box main-content">
            <div id="event-log">
                <div class="log-entry system">-> 系統初始化完成。等待玩家指令...</div>
            </div>
        </div>

        <div class="box control-panel">
            <button onclick="action('scavenge')" id="btn-scavenge">野外搜刮</button>
            <button onclick="action('rest')" id="btn-rest">營地休息</button>
        </div>
    </div>

    <script>
        // 設定你的 GAS Web App URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzhBvrnLbp-LoaWZIoE3PYij_aoj1s34xPrUkUj8GRdRs_B_afmftS1XrZx0LrzbgoN/exec"; 
        
        // 遊戲核心變數
        let days = 0, hp = 100, hunger = 100, thirst = 100, userName = "";
        let isGameOver = false;

        // 事件日誌區
        const logEl = document.getElementById('event-log');

        // 事件池 (Event Pool)
        const events = [
            // 獎勵事件 (Reward)
            { text: "你在廢棄超市找到一罐未過期的罐頭！(HNG +30)", hp: 0, hng: 30, thr: 0, type: 'reward' },
            { text: "你發現了一瓶密封良好的瓶裝水。(THR +30)", hp: 0, hng: 0, thr: 30, type: 'reward' },
            { text: "你撿到一個舊醫療包，成功包紮了傷口。(HP +20)", hp: 20, hng: 0, thr: 0, type: 'reward' },
            { text: "今日風平浪靜，你找到了一些乾淨的野菜。(HNG +10, THR +5)", hp: 0, hng: 10, thr: 5, type: 'reward' },
            
            // 懲罰事件 (Penalty)
            { text: "你遇到了強盜伏擊，在逃跑中受傷了。(HP -30)", hp: -30, hng: 0, thr: 0, type: 'penalty' },
            { text: "你不小心滑落山坡，扭傷了腳踝。(HP -15)", hp: -15, hng: 0, thr: 0, type: 'penalty' },
            { text: "你喝到了受污染的水，感到一陣反胃。(HP -10, THR -10)", hp: -10, hng: 0, thr: -10, type: 'penalty' },
            { text: "遭遇強烈輻射塵，你感到身體不適。(HP -20, HNG -10)", hp: -20, hng: -10, thr: 0, type: 'penalty' },
            { text: "一場突如其來的沙塵暴讓你迷失方向，消耗了大量體力。(HNG -20, THR -20)", hp: 0, hng: -20, thr: -20, type: 'penalty' }
        ];

        // 輔助函式：新增日誌
        function addLog(text, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[第 ${days} 天] ${text}`;
            logEl.appendChild(entry);
            // 滾動條自動到底部 (因為是用 flex-direction: column-reverse，所以不需要手動滾動)
        }

        // 輔助函式：限制數值在 0~100
        function clamp(value) {
            return Math.max(0, Math.min(100, value));
        }

        // 更新介面 (UI)
        function updateUI() {
            // 更新文字
            document.getElementById('days').innerText = days;
            document.getElementById('hp-text').innerText = `${hp}/100`;
            document.getElementById('hunger-text').innerText = `${hunger}/100`;
            document.getElementById('thirst-text').innerText = `${thirst}/100`;

            // 更新狀態條寬度
            document.getElementById('hp-bar').style.width = `${hp}%`;
            document.getElementById('hunger-bar').style.width = `${hunger}%`;
            document.getElementById('thirst-bar').style.width = `${thirst}%`;
            
            // 數值低於 30 時顯示警告色 (CSS transition 會處理顏色變化)
            if(hp < 30) document.getElementById('hp-bar').style.backgroundColor = 'white'; else document.getElementById('hp-bar').style.backgroundColor = 'var(--danger-color)';
        }

        // 登入功能
        async function login() {
            const userInp = document.getElementById('user').value;
            const passInp = document.getElementById('pass').value;
            const msgEl = document.getElementById('login-msg');
            
            msgEl.innerText = "正在連線後端系統...";
            
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username: userInp, password: passInp })
                });
                const data = await res.json();
                
                if(data.status === 'success') {
                    userName = userInp;
                    document.getElementById('player-name').innerText = userName;
                    document.getElementById('login-overlay').style.display = 'none';
                    addLog(`歡迎，${userName}。你的生存挑戰開始了。`, 'reward');
                    updateUI();
                } else {
                    msgEl.innerText = "驗證失敗：帳號或密碼錯誤。";
                }
            } catch (err) {
                msgEl.innerText = "連線錯誤：請檢查 GAS URL 或網路設定。";
                console.error(err);
            }
        }

        // 遊戲主要行動 (Action)
        async function action(type) {
            if (isGameOver) return;

            days++; // 天數增加
            let dailyHungerLoss = 10;
            let dailyThirstLoss = 10;
            let currentEvent = null;

            if (type === 'scavenge') {
                dailyHungerLoss = 20; // 搜刮消耗更多
                dailyThirstLoss = 20;
                addLog("你離開營地，在廢土中搜尋可用物資...");

                // 60% 機率觸發隨機事件
                if (Math.random() < 0.6) {
                    currentEvent = events[Math.floor(Math.random() * events.length)];
                    hp = clamp(hp + currentEvent.hp);
                    hunger = clamp(hunger + currentEvent.hng);
                    thirst = clamp(thirst + currentEvent.thr);
                    addLog(`-> 事件：${currentEvent.text}`, currentEvent.type);
                } else {
                    addLog("-> 你一無所獲地回來了，體力消耗加倍。");
                }
            } else if (type === 'rest') {
                dailyHungerLoss = 5; // 休息消耗較少
                dailyThirstLoss = 5;
                let healAmount = 10;
                hp = clamp(hp + healAmount);
                addLog(`你在營地進行休息，傷口緩慢癒合。(HP +${healAmount})`);
            }

            // 扣除每日自然消耗
            hunger = clamp(hunger - dailyHungerLoss);
            thirst = clamp(thirst - dailyThirstLoss);
            
            // 飢餓或乾渴歸零時扣血
            if(hunger <= 0) { hp = clamp(hp - 20); addLog("你快餓死了！(HP -20)", 'penalty'); }
            if(thirst <= 0) { hp = clamp(hp - 20); addLog("你快渴死了！(HP -20)", 'penalty'); }

            updateUI();
            checkGameOver();
        }

        // 檢查遊戲結束條件
        async function checkGameOver() {
            if (hp <= 0 && !isGameOver) {
                isGameOver = true;
                document.getElementById('btn-scavenge').disabled = true;
                document.getElementById('btn-rest').disabled = true;
                
                addLog("你已在廢土中死亡。生存挑戰結束。", 'death');
                
                // 存檔
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'saveScore', username: userName, daysSurvived: days })
                });
                
                // 3秒後重新載入
                setTimeout(() => { location.reload(); }, 3000);
            }
        }
    </script>
</body>
</html>

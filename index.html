<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>代號-亞當 (PROJECT ADAM)</title>
    <style>
        :root { --main: #00ff41; --bg: #050505; --danger: #ff4444; --warn: #ffbb00; }
        body { background: #000; color: var(--main); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* 視覺優化：動態掃描線 */
        body::before { content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.03)); background-size: 100% 4px, 3px 100%; pointer-events: none; opacity: 0.15; z-index: 9999; }

        /* 視覺優化：玻璃擬態面板 */
        #game-ui { display: none; grid-template-columns: 320px 1fr 320px; grid-template-rows: 70px 1fr 150px; gap: 20px; max-width: 1300px; width: 100%; height: 85vh; padding: 20px; }
        .panel { background: rgba(10, 15, 10, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 65, 0.3); padding: 20px; position: relative; }
        
        /* 視覺優化：呼吸效果狀態條 */
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .fill { height: 100%; background: var(--main); animation: pulse 2s infinite; box-shadow: 0 0 15px var(--main); transition: 0.4s; }
        
        button { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--main); color: var(--main); padding: 12px; margin: 6px 0; width: 100%; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        button:hover { background: var(--main); color: #000; box-shadow: 0 0 15px var(--main); }
        #log { height: 300px; overflow-y: auto; font-size: 0.9em; border: 1px solid #222; padding: 10px; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="home-screen" style="text-align:center;">
        <h1 style="font-size: 3em; text-shadow: 0 0 20px var(--main);">> [ 代號-亞當 ]</h1>
        <button style="width:300px;" onclick="newGame()">開始任務</button>
    </div>

    <div id="game-ui">
        <div class="panel" style="grid-column: 1/4; display:flex; justify-content:space-between;">
            <div>> 系統: 已連接 | <span id="weather">天氣: 晴天</span></div>
            <div>STATUS: ONLINE</div>
        </div>

        <div class="panel">
            <h3>[ 生理體徵 ]</h3>
            HP: <div style="height:10px; background:#111;"><div id="hp-bar" class="fill" style="width:100%"></div></div>
            飢餓: <div style="height:10px; background:#111;"><div id="hng-bar" class="fill" style="width:100%"></div></div>
            <button onclick="showBackpack()">[ 開啟背包 ]</button>
        </div>

        <div class="panel">
            <h3>[ 行動日誌 ]</h3>
            <div id="log"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button onclick="scavenge('醫院')">搜尋醫院</button><button onclick="scavenge('森林')">森林狩獵</button>
                <button onclick="scavenge('超市')">搜尋超市</button><button onclick="scavenge('停車場')">搜尋停車場</button>
            </div>
        </div>

        <div class="panel">
            <h3>[ 營地管理 ]</h3>
            <p>成員: <span id="comp-count">0</span> 名</p>
            <button onclick="rest()">營地休息</button>
        </div>
    </div>

    <script>
        // 加入 GAS 連結
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzhBvrnLbp-LoaWZIoE3PYij_aoj1s34xPrUkUj8GRdRs_B_afmftS1XrZx0LrzbgoN/exec";
        
        let state = { hp: 100, hng: 100, backpack: ['罐頭'], companions: [], affinity: 0 };

        function newGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'grid';
            updateUI();
            addLog("系統啟動，歡迎回到廢土。");
        }

        function updateUI() {
            document.getElementById('hp-bar').style.width = Math.max(0, state.hp) + '%';
            document.getElementById('hng-bar').style.width = Math.max(0, state.hng) + '%';
            document.getElementById('comp-count').innerText = state.companions.length;
        }

        function addLog(msg) { document.getElementById('log').innerHTML = `<div>> ${msg}</div>` + document.getElementById('log').innerHTML; }

        function scavenge(area) {
            if(Math.random() < 0.2) { handleEncounter(); return; }

            if (area === '森林') {
                huntInForest();
            } else {
                addLog(`探索 ${area}...`);
                if (area === '醫院') {
                    if(Math.random() < 0.7) state.backpack.push('醫療包');
                    else addLog("醫院已被洗劫，一無所獲。");
                } else {
                    state.backpack.push(Math.random() < 0.5 ? '罐頭' : '瓶裝水');
                    addLog("搜尋到物資。");
                }
            }
            state.hng -= 5;
            updateUI();
        }

        function huntInForest() {
            addLog("進入森林尋找獵物...");
            let isCarnivore = Math.random() > 0.7;
            if (!isCarnivore) {
                if (Math.random() < 0.8) { state.backpack.push('生肉'); addLog("獵捕草食動物成功。"); }
                else addLog("獵物逃走了。");
            } else {
                if (Math.random() < 0.5) { state.backpack.push('優質肉塊'); addLog("擊殺肉食動物！"); }
                else { state.hp -= 20; addLog("遭到肉食動物攻擊！HP -20！"); }
            }
            updateUI();
        }

        function handleEncounter() {
            addLog("!! 發現倖存者 !!");
            if(confirm("邀請加入營地？(需好感度達標)")) {
                state.affinity++;
                if(state.affinity >= 2) {
                    state.companions.push("成員");
                    addLog("新成員加入營地！");
                } else {
                    addLog("好感度不足，無法招募。");
                }
            }
        }

        function rest() {
            state.hp = Math.min(100, state.hp + 10);
            state.hng -= 8;
            state.companions.forEach(() => { if(Math.random() < 0.3) state.backpack.push('瓶裝水'); });
            addLog("休息完畢，同伴回報物資。");
            updateUI();
        }

        function showBackpack() { alert("背包物品: " + state.backpack.join(", ")); }
    </script>
</body>
</html>
